{% extends "base.html" %}

{% block main %}
<div class="row justify-content-center mt-5">
  <div class="col-md-10">
    <div class="card shadow-sm">
      <div class="row g-0">
        <div class="col-md-5">
          <img src="{{ url_for('static', filename='uploads/' + property.photo) }}"
               class="img-fluid rounded-start h-100"
               alt="{{ property.title }}"
               style="object-fit: cover; max-height: 400px; width: 100%;">
        </div>
        <div class="col-md-7">
          <div class="card-body p-4">
            <h4 class="card-title fw-bold">{{ property.title }}</h4>

            <div class="mb-3">
              <span class="badge me-2" style="background-color: #0dcaf0; font-size: 0.9rem;">${{ property.price }}</span>
              <span class="badge" style="background-color: #ffc107; color: #000; font-size: 0.9rem;">{{ property.property_type }}</span>
            </div>

            <p class="card-text">{{ property.description }}</p>

            <div class="d-flex gap-4 mb-3">
              <span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-door-open me-1" viewBox="0 0 16 16">
                  <path d="M8.5 10c-.276 0-.5-.448-.5-1s.224-1 .5-1 .5.448.5 1-.224 1-.5 1"/>
                  <path d="M10.828.122A.5.5 0 0 1 11 .5V1h.5A1.5 1.5 0 0 1 13 2.5V15h1.5a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1H3V1.5a.5.5 0 0 1 .43-.495l7-1a.5.5 0 0 1 .398.117M11.5 2H11v13h1V2.5a.5.5 0 0 0-.5-.5M4 1.934V15h6V1.077z"/>
                </svg>
                {{ property.no_of_rooms }} Bedrooms
              </span>
              <span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-columns me-1" viewBox="0 0 16 16">
                  <path d="M0 2a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1zm8.5 0v8H15V2zm0 9v3H15v-3zm-1 3V11H1v3zm0-4V2H1v8z"/>
                </svg>
                {{ property.no_of_bathrooms }} Bathrooms
              </span>
            </div>

            <p class="mb-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-geo-alt me-1" viewBox="0 0 16 16">
                <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>
                <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4m0 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
              </svg>
              {{ property.location }}
            </p>

            <a href="mailto:" class="btn text-white" style="background-color: #20c997;">Email Realtor</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
